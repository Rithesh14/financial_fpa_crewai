# FP&A CrewAI Task Definitions
#
# DESIGN RULES (read before editing):
#
#   1. fpa_analysis_tool is EXPENSIVE (reads CSV, runs full analytics).
#      Call it ONLY in performance_analysis_task and chart_generation_task.
#      Every other task has `context:` from performance_analysis_task —
#      use that context instead.  Calling fpa_analysis_tool without a valid
#      csv_path causes the agent to guess a filename, fail, retry, and burn
#      ~1–2 K tokens per failed attempt before hitting the Groq TPM limit.
#
#   2. Chart tools that take csv_path must receive EXACTLY {csv_path}.
#      Never omit it or the tool will raise FileNotFoundError.
#
#   3. BenchmarkComparison.company_value must be a float (not null/None).
#      When a metric is unavailable, output 0.0 and note it in the assessment.

performance_analysis_task:
  description: >
    Analyze {company_name} using the dataset at {csv_path}.

    Call fpa_analysis_tool with EXACTLY these string arguments:
      csv_path="{csv_path}", company="{company_name}", sector="IT"
    Do NOT use any other csv_path value — do not guess or invent filenames.

    Then call:
      generate_revenue_trend_chart(csv_path="{csv_path}", company="{company_name}")
      generate_profitability_analysis_chart(csv_path="{csv_path}", company="{company_name}")

    Report:
    1. Revenue CAGR over full period (as a percentage, e.g. 18.61 for 18.61%)
    2. YoY revenue growth for last 5 years
    3. Latest EBITDA margin and 5-year trend (as a percentage, e.g. 33.1 for 33.1%)
    4. Operating cash flow (latest + average)
    5. Cash conversion ratio
    6. Top 3 positives and top 3 concerns
  expected_output: >
    Structured performance report for {company_name} following the PerformanceAnalysisOutput schema:
    company_name, analysis_period, revenue (current_revenue, yoy_growth, cagr, trend),
    profitability (current_ebitda_margin, margin_trend, operating_leverage_evidence),
    cash_flow (operating_cash_flow, cash_conversion_ratio, free_cash_flow),
    top_3_positives (list of 3), top_3_concerns (list of 3).

    IMPORTANT: Store cagr and yoy_growth as plain percentages (e.g. 18.61, not 0.1861).
    Store current_ebitda_margin as a plain percentage (e.g. 33.1, not 0.331).
  agent: fpa_analyst

market_research_task:
  description: >
    Compare {company_name}'s metrics against {benchmark_sector} industry benchmarks
    from your knowledge base.

    *** DO NOT call fpa_analysis_tool or any other data tool. ***
    All company metric values are already in your context from performance_analysis_task.
    Extract: EBITDA margin, revenue growth, debt/equity ratio, current ratio from context.

    For ROE — if it is not present in context, set company_value=0.0 and note
    "ROE not available in dataset" in the assessment field. Do NOT output null.

    For each key metric (EBITDA margin, revenue growth, debt/equity, current ratio, ROE):
      - company_value: number from context (use 0.0 if genuinely missing, never null)
      - industry_median: from your knowledge base only — never invent numbers
      - assessment: "Outperforms", "Matches", or "Underperforms"

    List 3 key market trends for {benchmark_sector}.
  expected_output: >
    Market intelligence report following MarketResearchOutput schema:
    company_name, sector, benchmarks (list of BenchmarkComparison — company_value MUST
    be a float, use 0.0 if unknown), market_trends (list of 3), competitive_position_summary.
  agent: market_researcher
  context:
    - performance_analysis_task

scenario_planning_task:
  description: >
    Create 3 revenue scenarios for {company_name}.

    *** DO NOT call fpa_analysis_tool. ***
    All required data (base revenue, CAGR, growth trend) is already in your context
    from performance_analysis_task. Use those numbers directly.

    Methodology:
    - Base growth rate = CAGR from context
    - σ (standard deviation) = 3.0% if historical volatility is not available in context
    - Best Case  growth = CAGR + σ  (probability weight: 0.25)
    - Base Case  growth = CAGR      (probability weight: 0.50)
    - Worst Case growth = CAGR − σ  (probability weight: 0.25)

    Calculate Y1/Y2/Y3 revenues by compounding from base_revenue.
    Then call: generate_scenario_comparison_chart(csv_path="{csv_path}", company="{company_name}")
    List top 3 sensitivity drivers.
  expected_output: >
    Scenario plan following ScenarioPlanningOutput schema:
    company_name, base_revenue (float, in millions), scenarios (list of exactly 3
    ScenarioProjection: scenario_name, growth_rate as plain percentage e.g. 8.79,
    assumptions list, year_1_revenue, year_2_revenue, year_3_revenue, probability_weight),
    sensitivity_drivers (list of 3 strings).
  agent: scenario_analyst
  context:
    - performance_analysis_task
    - market_research_task

risk_assessment_task:
  description: >
    Assess financial risk for {company_name}.

    *** DO NOT call fpa_analysis_tool. ***
    All required data (debt/equity ratio, current ratio, OCF, EBITDA margin) is
    already in your context from performance_analysis_task. Use those numbers directly.

    Classify each metric against these thresholds:
    - Debt/Equity: threshold = 1.5 for {benchmark_sector} sector
      (HIGH risk if > 1.5, MODERATE if 1.0–1.5, LOW if < 1.0)
    - Current Ratio: CRITICAL if < 1.0, HIGH if 1.0–1.5, LOW if > 1.5
    - OCF trend: assess direction from context (positive/stable/declining)
    - EBITDA margin: LOW risk if > 20%, MODERATE if 10–20%, HIGH if < 10%

    All metric current_value and threshold fields MUST be floats — use 0.0
    if a value is genuinely unknown, never leave them as null.

    Then call: generate_risk_dashboard(csv_path="{csv_path}", company="{company_name}")
    Provide exactly 3 mitigation recommendations as plain strings.
  expected_output: >
    Risk report following RiskAssessmentOutput schema:
    company_name, overall_risk_level ("low"/"moderate"/"high"/"critical"),
    metrics (list of RiskMetric — current_value and threshold are floats, not null),
    risk_flags (list of strings), mitigation_recommendations (list of exactly 3 strings).
  agent: risk_analyst
  context:
    - performance_analysis_task
    - market_research_task

chart_generation_task:
  description: >
    Generate all remaining charts for {company_name}.
    For every chart tool call, pass EXACTLY csv_path="{csv_path}" and company="{company_name}".
    Do NOT omit csv_path or guess filenames.

    Generate in this order:
    1. generate_revenue_trend_chart(csv_path="{csv_path}", company="{company_name}")
    2. generate_profitability_analysis_chart(csv_path="{csv_path}", company="{company_name}")
    3. generate_scenario_comparison_chart(csv_path="{csv_path}", company="{company_name}")
    4. generate_risk_dashboard(csv_path="{csv_path}", company="{company_name}")
    5. generate_waterfall_chart(csv_path="{csv_path}", company="{company_name}")
    6. generate_radar_chart(csv_path="{csv_path}", company="{company_name}")

    For each chart, confirm the output file path and provide one-line insight.
    Skip any chart that already has an output file in the charts/ directory.
  expected_output: >
    Confirmation of up to 6 charts generated in charts/ directory.
    For each: chart name, file path (e.g. charts/revenue_trend.png), one-line insight.
  agent: fpa_analyst
  context:
    - performance_analysis_task
    - scenario_planning_task
    - risk_assessment_task

cfo_advisory_task:
  description: >
    Synthesize all findings for {company_name} into a board-ready executive memo.

    *** DO NOT call any tools. DO NOT invent new numbers. ***
    Use ONLY the outputs already present in your context from all prior tasks.

    Write:
    - executive_summary: exactly 2-3 sentences for the board
    - performance_highlights: exactly 3 items (strings)
    - risk_considerations: exactly 3 items (strings)
    - future_outlook: 1-2 sentences
    - recommendations: exactly 3 to 5 StrategicRecommendation objects, each with:
        title (string), rationale (string),
        priority ("immediate" | "short-term" | "medium-term"),
        expected_impact (string)
  expected_output: >
    Executive advisory memo following CFOAdvisoryOutput schema:
    company_name, executive_summary, performance_highlights (list of 3),
    risk_considerations (list of 3), future_outlook,
    recommendations (list of 3-5 StrategicRecommendation with title/rationale/priority/expected_impact).
  agent: cfo_advisor
  context:
    - performance_analysis_task
    - market_research_task
    - scenario_planning_task
    - risk_assessment_task
    - chart_generation_task
